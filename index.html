<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime & Filmes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #3C3E57;
            min-height: 100vh;
        }
        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #e74c3c, #f39c12);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .search-box { display: flex; gap: 0.5rem; }
        .search-box input {
            padding: 0.7rem 1rem;
            border-radius: 30px;
            border: none;
            width: 250px;
            font-size: 1rem;
            background: #2a2a3a;
            color: #fff;
        }
        .search-box button {
            padding: 0.7rem 1.2rem;
            border-radius: 30px;
            border: none;
            background: #e74c3c;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .categories-menu {
            background: rgba(0, 0, 0, 0.7);
            padding: 0.8rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .categories-scroll {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .categories-scroll::-webkit-scrollbar { height: 4px; }
        .categories-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .categories-scroll::-webkit-scrollbar-thumb { background: #e74c3c; border-radius: 10px; }
        .category-chip {
            background: transparent;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .category-chip.active, .category-chip:hover { background: #e74c3c; color: white; }
        .main-filters {
            max-width: 1400px;
            margin: 1rem auto 0;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .type-filters { display: flex; gap: 1rem; }
        .type-btn {
            background: transparent;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .type-btn.active { background: #e74c3c; color: white; }
        .action-btn {
            background: #e74c3c;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            padding-left: 0.5rem;
            border-left: 4px solid #e74c3c;
        }
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: #1e1e2a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
            position: relative;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            z-index: 2;
        }
        .action-icon {
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .card-info { padding: 0.8rem; }
        .card-info h3 {
            font-size: 1rem;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-info p { font-size: 0.8rem; color: #aaa; display: flex; justify-content: space-between; }
        .rating { color: #f39c12; }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .page-btn {
            background: #1e1e2a;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .page-btn.active { background: #e74c3c; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 2rem;
        }
        .modal-content {
            background: #1e1e2a;
            max-width: 900px;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
            position: relative;
        }
        .modal-poster { width: 280px; object-fit: cover; }
        .modal-info { flex: 1; padding: 1.5rem; }
        .modal-info h2 { margin-bottom: 0.5rem; }
        .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 1rem 0; }
        .modal-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .modal-btn.secondary { background: #2c3e50; }
        .trailer-container { margin-top: 1rem; display: none; }
        .trailer-container iframe { width: 100%; height: 250px; border-radius: 8px; }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: white;
            background: rgba(0,0,0,0.5);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .share-buttons { display: flex; gap: 10px; margin-top: 1rem; flex-wrap: wrap; }
        .share-btn {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .share-fb { background: #1877f2; color: white; }
        .share-tw { background: #1da1f2; color: white; }
        .share-wa { background: #25d366; color: white; }
        .share-telegram { background: #0088cc; color: white; }
        .loading { text-align: center; padding: 3rem; font-size: 1.2rem; color: #aaa; }
        footer { text-align: center; padding: 2rem; background: rgba(0,0,0,0.5); margin-top: 2rem; }
        @media (max-width: 700px) {
            .header-content, .main-filters { flex-direction: column; align-items: stretch; }
            .search-box input { width: 100%; }
            .modal-content { flex-direction: column; }
            .modal-poster { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <h1>🎬 Anime & Filmes</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar filme, anime, série..." />
            <button id="searchBtn">🔍 Buscar</button>
        </div>
    </div>
</header>

<div class="categories-menu">
    <div class="categories-scroll" id="categoriesList">
        <button class="category-chip active" data-genre="">🎭 Todos</button>
        <div class="loading" style="padding: 0;">Carregando...</div>
    </div>
</div>

<div class="main-filters">
    <div class="type-filters">
        <button class="type-btn active" data-type="movie">🎬 Filmes</button>
        <button class="type-btn" data-type="tv">📺 Animes/Séries</button>
    </div>
    <div>
        <button class="action-btn" id="showFavoritesBtn">⭐ Favoritos</button>
        <button class="action-btn" id="showWatchlistBtn">📋 Assistir Depois</button>
    </div>
</div>

<div class="container">
    <h2 class="section-title" id="sectionTitle">Populares</h2>
    <div class="movies-grid" id="moviesGrid">
        <div class="loading">🎬 Carregando...</div>
    </div>
    <div class="pagination" id="pagination"></div>
</div>

<footer>
    <p>Dados por TMDb |percyamutombenne-stack/meu_site_Filmes |todos direitos reservados| site em desenvolvimento</p>
</footer>

<div class="modal" id="modal">
    <span class="close-modal">&times;</span>
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
    const API_KEY = 'c6798b14717251bedbd1b520ca954ee1';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMG_URL = 'https://image.tmdb.org/t/p/w500';

    let currentType = 'movie';
    let currentPage = 1;
    let currentQuery = '';
    let currentGenre = '';
    let showingFavorites = false;
    let showingWatchlist = false;
    
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let watchlist = JSON.parse(localStorage.getItem('watchlist')) || [];

    const moviesGrid = document.getElementById('moviesGrid');
    const sectionTitle = document.getElementById('sectionTitle');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');
    const paginationDiv = document.getElementById('pagination');
    const categoriesList = document.getElementById('categoriesList');

    function saveFavorites() { localStorage.setItem('favorites', JSON.stringify(favorites)); }
    function saveWatchlist() { localStorage.setItem('watchlist', JSON.stringify(watchlist)); }
    function isFavorite(id) { return favorites.some(fav => fav.id === id && fav.type === currentType); }
    function isInWatchlist(id) { return watchlist.some(w => w.id === id && w.type === currentType); }

    function addFavorite(item) {
        if (!isFavorite(item.id)) {
            favorites.push({
                id: item.id, type: currentType,
                title: currentType === 'movie' ? item.title : item.name,
                poster: item.poster_path,
                year: currentType === 'movie' ? (item.release_date ? item.release_date.split('-')[0] : '?') : (item.first_air_date ? item.first_air_date.split('-')[0] : '?'),
                rating: item.vote_average
            });
            saveFavorites();
        }
    }
    function removeFavorite(id) { favorites = favorites.filter(fav => !(fav.id === id && fav.type === currentType)); saveFavorites(); }
    function addToWatchlist(item) {
        if (!isInWatchlist(item.id)) {
            watchlist.push({
                id: item.id, type: currentType,
                title: currentType === 'movie' ? item.title : item.name,
                poster: item.poster_path,
                year: currentType === 'movie' ? (item.release_date ? item.release_date.split('-')[0] : '?') : (item.first_air_date ? item.first_air_date.split('-')[0] : '?'),
                rating: item.vote_average
            });
            saveWatchlist();
        }
    }
    function removeFromWatchlist(id) { watchlist = watchlist.filter(w => !(w.id === id && w.type === currentType)); saveWatchlist(); }
    function toggleFavorite(item) { if (isFavorite(item.id)) removeFavorite(item.id); else addFavorite(item); refreshView(); }
    function toggleWatchlist(item) { if (isInWatchlist(item.id)) removeFromWatchlist(item.id); else addToWatchlist(item); refreshView(); }
    function refreshView() { if (showingFavorites) displayFavorites(); else if (showingWatchlist) displayWatchlist(); else loadContent(); }

    async function loadGenres() {
        try {
            const endpoint = `${BASE_URL}/genre/${currentType}/list?api_key=${API_KEY}&language=pt-BR`;
            const response = await fetch(endpoint);
            const data = await response.json();
            categoriesList.innerHTML = '<button class="category-chip active" data-genre="">🎭 Todos</button>';
            if (data.genres) {
                data.genres.forEach(genre => {
                    categoriesList.innerHTML += `<button class="category-chip" data-genre="${genre.id}">${genre.name}</button>`;
                });
            }
            document.querySelectorAll('.category-chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-chip').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentGenre = btn.dataset.genre;
                    currentPage = 1;
                    showingFavorites = false;
                    showingWatchlist = false;
                    loadContent();
                });
            });
        } catch(e) { console.error('Erro gêneros:', e); }
    }

    async function loadContent() {
        showingFavorites = false; showingWatchlist = false;
        if (currentQuery) await searchContent();
        else await loadPopular();
    }

    async function loadPopular() {
        moviesGrid.innerHTML = '<div class="loading">🎬 Carregando...</div>';
        try {
            let endpoint = `${BASE_URL}/${currentType}/popular?api_key=${API_KEY}&language=pt-BR&page=${currentPage}`;
            if (currentGenre) endpoint += `&with_genres=${currentGenre}`;
            const response = await fetch(endpoint);
            const data = await response.json();
            displayItems(data.results);
            renderPagination(data.total_pages);
            sectionTitle.innerText = currentType === 'movie' ? '🎬 Filmes Populares' : '📺 Animes/Séries Populares';
            if (currentGenre) sectionTitle.innerText += ` • Filtrado`;
        } catch(e) { moviesGrid.innerHTML = '<div class="loading">Erro ao carregar</div>'; }
    }

    async function searchContent() {
        moviesGrid.innerHTML = '<div class="loading">🔍 Buscando...</div>';
        try {
            let endpoint = `${BASE_URL}/search/${currentType}?api_key=${API_KEY}&language=pt-BR&query=${encodeURIComponent(currentQuery)}&page=${currentPage}`;
            const response = await fetch(endpoint);
            const data = await response.json();
            displayItems(data.results);
            renderPagination(data.total_pages);
            sectionTitle.innerText = `🔎 Resultados: "${currentQuery}"`;
        } catch(e) { moviesGrid.innerHTML = '<div class="loading">Erro na busca</div>'; }
    }

    function displayItems(items) {
        if (!items || items.length === 0) { moviesGrid.innerHTML = '<div class="loading">Nenhum resultado</div>'; paginationDiv.innerHTML = ''; return; }
        moviesGrid.innerHTML = '';
        items.forEach(item => {
            let imageUrl = 'https://via.placeholder.com/300x450?text=Sem+Imagem';
            if (item.poster_path) imageUrl = IMG_URL + item.poster_path;
            const title = currentType === 'movie' ? item.title : (item.name || item.original_name);
            const year = currentType === 'movie' ? (item.release_date ? item.release_date.split('-')[0] : '?') : (item.first_air_date ? item.first_air_date.split('-')[0] : '?');
            const rating = item.vote_average ? item.vote_average.toFixed(1) : '0';
            const card = document.createElement('div');
            card.classList.add('card');
            card.innerHTML = `
                <div class="card-actions">
                    <div class="action-icon favorite-icon">${isFavorite(item.id) ? '❤️' : '🤍'}</div>
                    <div class="action-icon watchlist-icon">${isInWatchlist(item.id) ? '📋✅' : '📋'}</div>
                </div>
                <img src="${imageUrl}" alt="${title}" onerror="this.src='https://via.placeholder.com/300x450?text=Erro'">
                <div class="card-info">
                    <h3>${title.substring(0, 35)}${title.length > 35 ? '...' : ''}</h3>
                    <p><span>${year}</span> <span class="rating">⭐ ${rating}</span></p>
                </div>
            `;
            card.addEventListener('click', (e) => { if (!e.target.closest('.action-icon')) showDetails(item.id); });
            card.querySelector('.favorite-icon').addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(item); e.target.textContent = isFavorite(item.id) ? '❤️' : '🤍'; });
            card.querySelector('.watchlist-icon').addEventListener('click', (e) => { e.stopPropagation(); toggleWatchlist(item); e.target.textContent = isInWatchlist(item.id) ? '📋✅' : '📋'; });
            moviesGrid.appendChild(card);
        });
    }

    function displayFavorites() {
        showingFavorites = true; showingWatchlist = false;
        sectionTitle.innerText = '⭐ Meus Favoritos';
        const filtered = favorites.filter(fav => fav.type === currentType);
        if (filtered.length === 0) { moviesGrid.innerHTML = '<div class="loading">✨ Nenhum favorito</div>'; paginationDiv.innerHTML = ''; return; }
        moviesGrid.innerHTML = '';
        filtered.forEach(item => {
            const posterUrl = item.poster ? IMG_URL + item.poster : 'https://via.placeholder.com/300x450?text=Sem+Imagem';
            const card = document.createElement('div');
            card.classList.add('card');
            card.innerHTML = `
                <div class="card-actions"><div class="action-icon favorite-icon">❤️</div></div>
                <img src="${posterUrl}" alt="${item.title}">
                <div class="card-info"><h3>${item.title}</h3><p><span>${item.year || '?'}</span> <span class="rating">⭐ ${item.rating ? item.rating.toFixed(1) : '0'}</span></p></div>
            `;
            card.addEventListener('click', () => showDetails(item.id));
            card.querySelector('.favorite-icon').addEventListener('click', (e) => { e.stopPropagation(); removeFavorite(item.id); displayFavorites(); });
            moviesGrid.appendChild(card);
        });
        paginationDiv.innerHTML = '';
    }

    function displayWatchlist() {
        showingWatchlist = true; showingFavorites = false;
        sectionTitle.innerText = '📋 Assistir Depois';
        const filtered = watchlist.filter(w => w.type === currentType);
        if (filtered.length === 0) { moviesGrid.innerHTML = '<div class="loading">📋 Nenhum item</div>'; paginationDiv.innerHTML = ''; return; }
        moviesGrid.innerHTML = '';
        filtered.forEach(item => {
            const posterUrl = item.poster ? IMG_URL + item.poster : 'https://via.placeholder.com/300x450?text=Sem+Imagem';
            const card = document.createElement('div');
            card.classList.add('card');
            card.innerHTML = `
                <div class="card-actions"><div class="action-icon watchlist-icon">📋✅</div></div>
                <img src="${posterUrl}" alt="${item.title}">
                <div class="card-info"><h3>${item.title}</h3><p><span>${item.year || '?'}</span> <span class="rating">⭐ ${item.rating ? item.rating.toFixed(1) : '0'}</span></p></div>
            `;
            card.addEventListener('click', () => showDetails(item.id));
            card.querySelector('.watchlist-icon').addEventListener('click', (e) => { e.stopPropagation(); removeFromWatchlist(item.id); displayWatchlist(); });
            moviesGrid.appendChild(card);
        });
        paginationDiv.innerHTML = '';
    }

    async function showDetails(id) {
        try {
            const response = await fetch(`${BASE_URL}/${currentType}/${id}?api_key=${API_KEY}&language=pt-BR&append_to_response=videos`);
            const data = await response.json();
            const posterUrl = data.poster_path ? IMG_URL + data.poster_path : 'https://via.placeholder.com/300x450?text=Sem+Imagem';
            const title = currentType === 'movie' ? data.title : data.name;
            const year = currentType === 'movie' ? (data.release_date ? data.release_date.split('-')[0] : '?') : (data.first_air_date ? data.first_air_date.split('-')[0] : '?');
            const genres = data.genres ? data.genres.map(g => g.name).join(', ') : 'Gênero não informado';
            const overview = data.overview || 'Sinopse não disponível';
            const rating = data.vote_average ? data.vote_average.toFixed(1) : '0';
            let trailerKey = null;
            if (data.videos && data.videos.results) {
                const trailer = data.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                if (trailer) trailerKey = trailer.key;
            }
            const currentUrl = window.location.href;
            modalContent.innerHTML = `
                <img class="modal-poster" src="${posterUrl}" alt="${title}">
                <div class="modal-info">
                    <h2>${title} (${year})</h2>
                    <div class="details">⭐ ${rating} | ${genres}</div>
                    <div class="overview"><strong>Sinopse:</strong><br>${overview}</div>
                    <div class="modal-actions">
                        ${trailerKey ? `<button class="modal-btn" id="trailerBtn">🎬 Assistir Trailer</button>` : '<button class="modal-btn secondary" disabled>🚫 Sem Trailer</button>'}
                        <button class="modal-btn secondary" id="shareModalBtn">📢 Compartilhar</button>
                    </div>
                    <div class="trailer-container" id="trailerContainer">${trailerKey ? `<iframe src="https://www.youtube.com/embed/${trailerKey}" frameborder="0" allowfullscreen></iframe>` : ''}</div>
                    <div class="share-buttons" id="shareModalButtons" style="display:none;">
                        <button class="share-btn share-fb" data-platform="facebook">📘 Facebook</button>
                        <button class="share-btn share-tw" data-platform="twitter">🐦 Twitter</button>
                        <button class="share-btn share-wa" data-platform="whatsapp">💬 WhatsApp</button>
                        <button class="share-btn share-telegram" data-platform="telegram">✈️ Telegram</button>
                    </div>
                    <p style="margin-top:1rem; color:#aaa; font-size:0.8rem;">Dados por TMDb</p>
                </div>
            `;
            modal.style.display = 'flex';
            if (trailerKey) {
                const trailerBtn = document.getElementById('trailerBtn');
                const trailerContainer = document.getElementById('trailerContainer');
                trailerContainer.style.display = 'none';
                trailerBtn.onclick = () => {
                    if (trailerContainer.style.display === 'none') { trailerContainer.style.display = 'block'; trailerBtn.textContent = '🔽 Esconder Trailer'; }
                    else { trailerContainer.style.display = 'none'; trailerBtn.textContent = '🎬 Assistir Trailer'; }
                };
            }
            const shareModalBtn = document.getElementById('shareModalBtn');
            const shareModalButtons = document.getElementById('shareModalButtons');
            shareModalBtn.onclick = () => {
                if (shareModalButtons.style.display === 'none') { shareModalButtons.style.display = 'flex'; shareModalBtn.textContent = '🔽 Esconder'; }
                else { shareModalButtons.style.display = 'none'; shareModalBtn.textContent = '📢 Compartilhar'; }
            };
            document.querySelectorAll('.share-btn').forEach(btn => {
                btn.onclick = () => {
                    const platform = btn.dataset.platform;
                    const text = `🎬 "${title}" (${year}) - Recomendo!`;
                    const url = encodeURIComponent(currentUrl);
                    let link = '';
                    if (platform === 'facebook') link = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
                    else if (platform === 'twitter') link = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${url}`;
                    else if (platform === 'whatsapp') link = `https://wa.me/?text=${encodeURIComponent(text + ' ' + currentUrl)}`;
                    else if (platform === 'telegram') link = `https://t.me/share/url?url=${url}&text=${encodeURIComponent(text)}`;
                    window.open(link, '_blank', 'width=600,height=400');
                };
            });
        } catch(e) { alert('Erro ao carregar detalhes'); }
    }

    function renderPagination(totalPages) {
        if (showingFavorites || showingWatchlist) { paginationDiv.innerHTML = ''; return; }
        const maxPages = Math.min(totalPages, 500);
        if (maxPages <= 1) { paginationDiv.innerHTML = ''; return; }
        let html = '';
        if (currentPage > 1) html += `<button class="page-btn" data-page="${currentPage - 1}">◀ Anterior</button>`;
        let start = Math.max(1, currentPage - 2);
        let end = Math.min(maxPages, currentPage + 2);
        for (let i = start; i <= end; i++) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        if (currentPage < maxPages) html += `<button class="page-btn" data-page="${currentPage + 1}">Próximo ▶</button>`;
        paginationDiv.innerHTML = html;
        document.querySelectorAll('.page-btn').forEach(btn => { btn.addEventListener('click', () => { currentPage = parseInt(btn.dataset.page); loadContent(); }); });
    }

    function setupEvents() {
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
                currentPage = 1; currentQuery = ''; currentGenre = ''; searchInput.value = '';
                showingFavorites = false; showingWatchlist = false;
                loadGenres();
                loadContent();
            });
        });
        searchBtn.onclick = () => { currentQuery = searchInput.value.trim(); currentPage = 1; if (currentQuery) loadContent(); else loadPopular(); };
        searchInput.onkeypress = (e) => { if (e.key === 'Enter') searchBtn.click(); };
        document.getElementById('showFavoritesBtn').onclick = () => { if (showingFavorites) loadContent(); else displayFavorites(); };
        document.getElementById('showWatchlistBtn').onclick = () => { if (showingWatchlist) loadContent(); else displayWatchlist(); };
        document.querySelector('.close-modal').onclick = () => { modal.style.display = 'none'; };
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    }

    loadGenres();
    loadPopular();
    setupEvents();
</script>
</body>
</html>
