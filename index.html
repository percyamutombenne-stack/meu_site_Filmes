<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Meu Catálogo · Filmes e Animes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0b0b14;
            color: #f0f0f0;
            padding-bottom: 3rem;
        }

        header {
            background: #0f0f1acc;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #2a2a3a;
            padding: 0.8rem 1.2rem;
        }

        .header-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .search-box {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            flex: 1;
            padding: 8px 16px;
            border-radius: 60px;
            border: none;
            background: #1e1e2e;
            color: white;
            font-size: 0.9rem;
        }

        .search-box button {
            background: #e74c3c;
            border: none;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .tipo-botoes {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 1rem 1rem 0.5rem 1rem;
            flex-wrap: wrap;
        }

        .tipo-btn {
            background: transparent;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .tipo-btn.ativo {
            background: #e74c3c;
            color: white;
        }

        /* Menu de Gêneros */
        .generos-menu {
            background: rgba(0, 0, 0, 0.5);
            padding: 0.8rem 1.2rem;
            margin-top: 0.5rem;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
        }

        .generos-scroll {
            display: inline-flex;
            gap: 10px;
            flex-wrap: nowrap;
        }

        .genero-chip {
            background: transparent;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 5px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .genero-chip.ativo {
            background: #e74c3c;
            color: white;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1rem 1.2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.3rem;
            margin: 1.5rem 0;
        }

        .card {
            background: #161622;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
            border: 1px solid #28283a;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card img {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            display: block;
        }

        .card-info {
            padding: 10px;
        }

        .card-info h3 {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ano-rating {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #aaa;
        }

        .paginacao {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 2rem 0;
        }

        .pag-btn {
            background: #1e1e2e;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
        }

        .pag-btn.ativo {
            background: #e74c3c;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000dd;
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .modal-card {
            background: #181828;
            max-width: 850px;
            width: 100%;
            border-radius: 32px;
            display: flex;
            flex-wrap: wrap;
            overflow: auto;
            max-height: 90vh;
        }

        .modal-poster {
            width: 240px;
            object-fit: cover;
            border-radius: 24px 0 0 24px;
        }

        .modal-info {
            flex: 1;
            padding: 20px;
        }

        .modal-acoes {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }

        .btn {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-outline {
            background: #2c2c42;
        }

        .fechar-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            margin: 12px;
        }

        .trailer-box {
            margin-top: 16px;
            display: none;
        }

        .trailer-box iframe {
            width: 100%;
            height: 200px;
            border-radius: 20px;
        }

        .redes {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .rede-btn {
            background: #2c3e50;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .erro {
            text-align: center;
            padding: 40px;
            color: #f39c12;
        }

        footer {
            text-align: center;
            opacity: 0.6;
            font-size: 0.7rem;
            margin-top: 2rem;
            padding: 1rem;
        }

        @media (max-width: 600px) {
            .modal-poster { width: 100%; border-radius: 24px 24px 0 0; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <h1>🎬 MeuCatálogo</h1>
        <div class="search-box">
            <input type="text" id="inputBusca" placeholder="Buscar filme, anime, série...">
            <button id="btnBuscar">Buscar</button>
        </div>
    </div>
</header>

<div class="tipo-botoes">
    <button class="tipo-btn ativo" data-tipo="movie">🎬 Filmes</button>
    <button class="tipo-btn" data-tipo="tv">📺 Animes / Séries</button>
</div>

<!-- Menu de Gêneros (será preenchido automaticamente) -->
<div class="generos-menu" id="generosMenu">
    <div class="generos-scroll" id="generosList">
        <button class="genero-chip ativo" data-genero="">🎭 Todos</button>
        <span style="color:#888;">Carregando gêneros...</span>
    </div>
</div>

<div class="container">
    <h2 id="tituloSecao">🔥 Populares</h2>
    <div id="grade" class="grid">
        <div class="erro">Carregando catálogo...</div>
    </div>
    <div id="paginacao" class="paginacao"></div>
</div>

<footer>
    <div style="text-align: center; padding-top: 1rem;">
        <p>Dados fornecidos por <a href="https://www.themoviedb.org/" target="_blank" style="color: #e74c3c;">The Movie Database (TMDb)</a></p>
        <p style="font-size: 0.7rem;">Este produto utiliza a API do TMDb mas não é endossado ou certificado pelo TMDb.</p>
    </div>
</footer>

<div id="modal" class="modal">
    <div class="modal-card">
        <span class="fechar-modal" id="fecharModalBtn">&times;</span>
        <img id="modalPoster" class="modal-poster" src="">
        <div class="modal-info">
            <h2 id="modalTitulo"></h2>
            <p id="modalSinopse" style="margin: 12px 0;"></p>
            <div id="modalBotoes" class="modal-acoes"></div>
            <div id="trailerContainer" class="trailer-box"></div>
            <div id="redesSociais" class="redes"></div>
        </div>
    </div>
</div>

<script>
    // =============================================
    // CONFIGURAÇÕES
    // =============================================
    const API_KEY = 'c6798b14717251bedbd1b520ca954ee1';
    const BASE = 'https://api.themoviedb.org/3';
    const IMG_BASE = 'https://image.tmdb.org/t/p/w400';

    let tipoAtual = 'movie';      // 'movie' ou 'tv'
    let paginaAtual = 1;
    let buscaAtual = '';
    let generoAtual = '';         // ID do gênero selecionado
    let totalPaginas = 1;
    let listaGeneros = [];         // Guarda os gêneros carregados

    // Elementos DOM
    const gradeEl = document.getElementById('grade');
    const tituloSecao = document.getElementById('tituloSecao');
    const inputBusca = document.getElementById('inputBusca');
    const btnBuscar = document.getElementById('btnBuscar');
    const paginacaoDiv = document.getElementById('paginacao');
    const generosList = document.getElementById('generosList');
    const modal = document.getElementById('modal');
    const modalPoster = document.getElementById('modalPoster');
    const modalTitulo = document.getElementById('modalTitulo');
    const modalSinopse = document.getElementById('modalSinopse');
    const modalBotoes = document.getElementById('modalBotoes');
    const trailerContainer = document.getElementById('trailerContainer');
    const redesSociais = document.getElementById('redesSociais');

    // Fechar modal
    document.getElementById('fecharModalBtn').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    // =============================================
    // CARREGAR GÊNEROS DA API
    // =============================================
    async function carregarGeneros() {
        try {
            const endpoint = `${BASE}/genre/${tipoAtual}/list?api_key=${API_KEY}&language=pt-BR`;
            const response = await fetch(endpoint);
            const data = await response.json();
            listaGeneros = data.genres || [];
            
            // Montar botões de gênero
            let html = `<button class="genero-chip ativo" data-genero="">🎭 Todos</button>`;
            listaGeneros.forEach(genero => {
                html += `<button class="genero-chip" data-genero="${genero.id}">${genero.name}</button>`;
            });
            generosList.innerHTML = html;
            
            // Adicionar eventos aos botões de gênero
            document.querySelectorAll('.genero-chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    // Remove classe 'ativo' de todos
                    document.querySelectorAll('.genero-chip').forEach(b => b.classList.remove('ativo'));
                    btn.classList.add('ativo');
                    
                    // Atualiza o gênero atual e recarrega
                    generoAtual = btn.getAttribute('data-genero');
                    paginaAtual = 1;
                    buscaAtual = '';
                    inputBusca.value = '';
                    carregarConteudo();
                });
            });
        } catch (error) {
            console.error('Erro ao carregar gêneros:', error);
            generosList.innerHTML = '<button class="genero-chip ativo" data-genero="">🎭 Todos</button>';
        }
    }

    // =============================================
    // ALTERNAR ENTRE FILMES / ANIMES
    // =============================================
    document.querySelectorAll('.tipo-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            tipoAtual = btn.getAttribute('data-tipo');
            
            // Resetar filtros
            buscaAtual = '';
            generoAtual = '';
            paginaAtual = 1;
            inputBusca.value = '';
            
            // Recarregar gêneros do novo tipo
            carregarGeneros();
            carregarConteudo();
        });
    });

    // =============================================
    // BUSCA
    // =============================================
    btnBuscar.addEventListener('click', () => {
        buscaAtual = inputBusca.value.trim();
        generoAtual = '';  // Resetar gênero quando busca
        paginaAtual = 1;
        
        // Resetar botão de gênero ativo
        document.querySelectorAll('.genero-chip').forEach(btn => {
            btn.classList.remove('ativo');
            if (btn.getAttribute('data-genero') === '') {
                btn.classList.add('ativo');
            }
        });
        
        carregarConteudo();
    });
    
    inputBusca.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') btnBuscar.click();
    });

    // =============================================
    // CARREGAR CONTEÚDO PRINCIPAL
    // =============================================
    async function carregarConteudo() {
        gradeEl.innerHTML = '<div class="erro">⏳ Carregando...</div>';
        
        try {
            let url = '';
            
            if (buscaAtual !== '') {
                // MODO BUSCA
                url = `${BASE}/search/${tipoAtual}?api_key=${API_KEY}&language=pt-BR&query=${encodeURIComponent(buscaAtual)}&page=${paginaAtual}`;
                tituloSecao.innerText = `🔍 Resultados: "${buscaAtual}"`;
            } else if (generoAtual !== '') {
                // MODO FILTRO POR GÊNERO
                // Descobrir o nome do gênero para mostrar no título
                const generoEncontrado = listaGeneros.find(g => g.id == generoAtual);
                const nomeGenero = generoEncontrado ? generoEncontrado.name : 'Gênero';
                tituloSecao.innerText = `🎭 ${nomeGenero} - ${tipoAtual === 'movie' ? 'Filmes' : 'Animes/Séries'}`;
                
                // URL com filtro de gênero usando discover
                url = `${BASE}/discover/${tipoAtual}?api_key=${API_KEY}&language=pt-BR&with_genres=${generoAtual}&sort_by=popularity.desc&page=${paginaAtual}`;
            } else {
                // MODO POPULARES (padrão)
                url = `${BASE}/${tipoAtual}/popular?api_key=${API_KEY}&language=pt-BR&page=${paginaAtual}`;
                tituloSecao.innerText = tipoAtual === 'movie' ? '🎬 Filmes Populares' : '📺 Animes / Séries Populares';
            }

            console.log('URL:', url); // Para debug
            const resposta = await fetch(url);
            const dados = await resposta.json();
            
            if (!dados.results || dados.results.length === 0) {
                gradeEl.innerHTML = '<div class="erro">😕 Nada encontrado. Tente outro filtro ou busca.</div>';
                paginacaoDiv.innerHTML = '';
                return;
            }

            totalPaginas = Math.min(dados.total_pages, 500);
            renderizarCards(dados.results);
            renderizarPaginacao();
            
        } catch (erro) {
            console.error('Erro:', erro);
            gradeEl.innerHTML = '<div class="erro">❌ Erro ao carregar. Verifique sua conexão.</div>';
        }
    }

    // =============================================
    // RENDERIZAR CARDS
    // =============================================
    function renderizarCards(lista) {
        gradeEl.innerHTML = '';
        
        for (let item of lista) {
            const titulo = tipoAtual === 'movie' ? item.title : (item.name || item.original_name);
            const ano = tipoAtual === 'movie'
                ? (item.release_date ? item.release_date.split('-')[0] : '?')
                : (item.first_air_date ? item.first_air_date.split('-')[0] : '?');
            const nota = item.vote_average ? item.vote_average.toFixed(1) : '0';
            
            let imgUrl = 'https://placehold.co/300x450?text=Sem+Imagem';
            if (item.poster_path) imgUrl = IMG_BASE + item.poster_path;

            const card = document.createElement('div');
            card.classList.add('card');
            card.innerHTML = `
                <img src="${imgUrl}" alt="${titulo}" loading="lazy" onerror="this.src='https://placehold.co/300x450?text=Erro'">
                <div class="card-info">
                    <h3>${titulo}</h3>
                    <div class="ano-rating"><span>${ano}</span> <span>⭐ ${nota}</span></div>
                </div>
            `;
            card.addEventListener('click', () => abrirDetalhes(item.id));
            gradeEl.appendChild(card);
        }
    }

    // =============================================
    // DETALHES, TRAILER E COMPARTILHAR
    // =============================================
    let itemIdAtual = null;
    
    async function abrirDetalhes(id) {
        itemIdAtual = id;
        modal.style.display = 'flex';
        modalBotoes.innerHTML = '';
        trailerContainer.innerHTML = '';
        trailerContainer.style.display = 'none';
        redesSociais.innerHTML = '';

        try {
            const urlDetalhes = `${BASE}/${tipoAtual}/${id}?api_key=${API_KEY}&language=pt-BR`;
            const res = await fetch(urlDetalhes);
            const dados = await res.json();

            const titulo = tipoAtual === 'movie' ? dados.title : dados.name;
            const ano = tipoAtual === 'movie'
                ? (dados.release_date ? dados.release_date.split('-')[0] : '')
                : (dados.first_air_date ? dados.first_air_date.split('-')[0] : '');
            const sinopse = dados.overview || 'Sem descrição no momento.';
            
            let posterUrl = 'https://placehold.co/300x450?text=Poster';
            if (dados.poster_path) posterUrl = IMG_BASE + dados.poster_path;

            modalPoster.src = posterUrl;
            modalTitulo.innerText = `${titulo} ${ano ? `(${ano})` : ''}`;
            modalSinopse.innerText = sinopse;

            // Buscar trailer
            let trailerKey = null;
            try {
                const videoRes = await fetch(`${BASE}/${tipoAtual}/${id}/videos?api_key=${API_KEY}&language=pt-BR`);
                const videoData = await videoRes.json();
                const trailerObj = videoData.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                if (trailerObj) trailerKey = trailerObj.key;
            } catch(e) { console.warn('trailer não encontrado'); }

            // Botão trailer
            if (trailerKey) {
                const btnTrailer = document.createElement('button');
                btnTrailer.innerText = '🎬 Assistir Trailer';
                btnTrailer.classList.add('btn');
                btnTrailer.onclick = () => {
                    if (trailerContainer.style.display === 'flex') {
                        trailerContainer.style.display = 'none';
                        btnTrailer.innerText = '🎬 Assistir Trailer';
                    } else {
                        trailerContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${trailerKey}" frameborder="0" allowfullscreen></iframe>`;
                        trailerContainer.style.display = 'flex';
                        btnTrailer.innerText = '🔽 Esconder Trailer';
                    }
                };
                modalBotoes.appendChild(btnTrailer);
            } else {
                const semTrailer = document.createElement('button');
                semTrailer.innerText = '🚫 Trailer indisponível';
                semTrailer.classList.add('btn', 'btn-outline');
                semTrailer.disabled = true;
                modalBotoes.appendChild(semTrailer);
            }

            // Botão Onde Assistir (busca no Google)
            const btnOndeAssistir = document.createElement('button');
            btnOndeAssistir.innerText = '🔍 Onde Assistir';
            btnOndeAssistir.classList.add('btn', 'btn-outline');
            btnOndeAssistir.onclick = () => {
                const buscaGoogle = encodeURIComponent(`${titulo} onde assistir`);
                window.open(`https://www.google.com/search?q=${buscaGoogle}`, '_blank');
            };
            modalBotoes.appendChild(btnOndeAssistir);

            // Botão compartilhar
            const btnShare = document.createElement('button');
            btnShare.innerText = '📢 Compartilhar';
            btnShare.classList.add('btn', 'btn-outline');
            let redesVisiveis = false;
            btnShare.onclick = () => {
                if (redesVisiveis) {
                    redesSociais.style.display = 'none';
                    btnShare.innerText = '📢 Compartilhar';
                } else {
                    gerarBotoesCompartilhar(titulo, ano);
                    redesSociais.style.display = 'flex';
                    btnShare.innerText = '🔽 Esconder';
                }
                redesVisiveis = !redesVisiveis;
            };
            modalBotoes.appendChild(btnShare);

        } catch (erro) {
            console.error(erro);
            modalSinopse.innerText = 'Erro ao carregar os detalhes.';
        }
    }

    function gerarBotoesCompartilhar(titulo, ano) {
        const urlAtual = window.location.href;
        const textoCompartilhar = `🎬 "${titulo}" ${ano ? `(${ano})` : ''} - Dá uma olhada!`;
        
        redesSociais.innerHTML = `
            <div class="rede-btn" data-rede="facebook">📘 Facebook</div>
            <div class="rede-btn" data-rede="whatsapp">💬 WhatsApp</div>
            <div class="rede-btn" data-rede="twitter">🐦 Twitter</div>
        `;
        
        document.querySelectorAll('.rede-btn').forEach(btnRede => {
            btnRede.addEventListener('click', (e) => {
                const rede = btnRede.getAttribute('data-rede');
                let shareUrl = '';
                if (rede === 'facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(urlAtual)}`;
                else if (rede === 'whatsapp') shareUrl = `https://wa.me/?text=${encodeURIComponent(textoCompartilhar + ' ' + urlAtual)}`;
                else if (rede === 'twitter') shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(textoCompartilhar)}&url=${encodeURIComponent(urlAtual)}`;
                if (shareUrl) window.open(shareUrl, '_blank', 'width=600,height=400');
            });
        });
    }

    // =============================================
    // PAGINAÇÃO
    // =============================================
    function renderizarPaginacao() {
        if (totalPaginas <= 1) {
            paginacaoDiv.innerHTML = '';
            return;
        }
        
        let html = '';
        if (paginaAtual > 1) html += `<button class="pag-btn" data-pag="${paginaAtual-1}">◀ Anterior</button>`;
        
        let inicio = Math.max(1, paginaAtual - 2);
        let fim = Math.min(totalPaginas, paginaAtual + 2);
        for (let i = inicio; i <= fim; i++) {
            html += `<button class="pag-btn ${i === paginaAtual ? 'ativo' : ''}" data-pag="${i}">${i}</button>`;
        }
        
        if (paginaAtual < totalPaginas) html += `<button class="pag-btn" data-pag="${paginaAtual+1}">Próximo ▶</button>`;
        
        paginacaoDiv.innerHTML = html;
        
        document.querySelectorAll('.pag-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                paginaAtual = parseInt(btn.getAttribute('data-pag'));
                carregarConteudo();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    }

    // =============================================
    // INICIALIZAR
    // =============================================
    carregarGeneros();
    carregarConteudo();
</script>
</body>
</html>
